<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loan Approval Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3550;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(59,130,246,.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(6,182,212,.08) 0%, transparent 50%);
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(17,24,39,.7);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--text);
  }
  header span { color: var(--muted); font-size: .85rem; margin-left: auto; }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .hero {
    text-align: center;
    margin-bottom: 48px;
  }
  .hero h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.6rem;
    background: linear-gradient(135deg, #e2e8f0, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .hero p { color: var(--muted); font-size: 1rem; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(59,130,246,.15);
    border: 1px solid rgba(59,130,246,.3);
    color: #93c5fd;
    padding: 5px 14px;
    border-radius: 99px;
    font-size: .78rem;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
  }

  .card h3 {
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card h3::before {
    content: '';
    display: inline-block;
    width: 3px; height: 12px;
    background: linear-gradient(var(--accent), var(--accent2));
    border-radius: 2px;
  }

  .form-row { margin-bottom: 16px; }

  label {
    display: block;
    font-size: .8rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: inherit;
    font-size: .9rem;
    padding: 10px 14px;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,.15);
  }

  select option { background: var(--surface); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity .2s, transform .1s;
    letter-spacing: .02em;
  }
  .submit-btn:hover { opacity: .9; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* Result card */
  #result-card {
    display: none;
    grid-column: 1 / -1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    animation: fadeUp .4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-icon {
    font-size: 3.2rem;
    margin-bottom: 10px;
    display: block;
  }
  .result-status {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    margin-bottom: 6px;
  }
  .result-status.approved { color: var(--green); }
  .result-status.rejected { color: var(--red); }

  .result-sub { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }

  .metrics {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    min-width: 110px;
  }
  .metric-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
  .metric-value { font-size: 1.5rem; font-weight: 700; }

  .prob-bar {
    width: 100%;
    height: 8px;
    background: var(--surface);
    border-radius: 99px;
    margin: 20px 0 8px;
    overflow: hidden;
  }
  .prob-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width 1s cubic-bezier(.22,1,.36,1);
  }
  .prob-fill.low { background: linear-gradient(90deg, var(--red), var(--yellow)); }

  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .hero h2 { font-size: 2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">💳</div>
  <h1>LoanIQ</h1>
  <span>ML-Powered Eligibility Engine</span>
</header>

<div class="container">
  <div class="hero">
    <div class="badge">⚡ XGBoost · Random Forest · Logistic Regression</div>
    <h2>Loan Approval Predictor</h2>
    <p>Real-time eligibility predictions powered by ensemble machine learning</p>
  </div>

  <div class="grid">

    <!-- Personal Info -->
    <div class="card">
      <h3>Personal Information</h3>

      <div class="two-col">
        <div class="form-row">
          <label>Gender</label>
          <select id="gender">
            <option>Male</option><option>Female</option>
          </select>
        </div>
        <div class="form-row">
          <label>Marital Status</label>
          <select id="married">
            <option>Yes</option><option>No</option>
          </select>
        </div>
      </div>

      <div class="two-col">
        <div class="form-row">
          <label>Dependents</label>
          <select id="dependents">
            <option>0</option><option>1</option><option>2</option><option>3+</option>
          </select>
        </div>
        <div class="form-row">
          <label>Education</label>
          <select id="education">
            <option>Graduate</option><option>Not Graduate</option>
          </select>
        </div>
      </div>

      <div class="two-col">
        <div class="form-row">
          <label>Self Employed</label>
          <select id="self_employed">
            <option>No</option><option>Yes</option>
          </select>
        </div>
        <div class="form-row">
          <label>Property Area</label>
          <select id="property_area">
            <option>Semiurban</option><option>Urban</option><option>Rural</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Financial Info -->
    <div class="card">
      <h3>Financial Details</h3>

      <div class="form-row">
        <label>Applicant Income (₹ / month)</label>
        <input type="number" id="applicant_income" placeholder="e.g. 50000" min="0" value="55000"/>
      </div>

      <div class="form-row">
        <label>Co-applicant Income (₹ / month)</label>
        <input type="number" id="coapplicant_income" placeholder="e.g. 0 if none" min="0" value="0"/>
      </div>

      <div class="two-col">
        <div class="form-row">
          <label>Loan Amount (₹ thousands)</label>
          <input type="number" id="loan_amount" placeholder="e.g. 150" min="1" value="150"/>
        </div>
        <div class="form-row">
          <label>Loan Term (months)</label>
          <select id="loan_amount_term">
            <option value="360">360 (30 yr)</option>
            <option value="180">180 (15 yr)</option>
            <option value="120">120 (10 yr)</option>
            <option value="60">60 (5 yr)</option>
            <option value="480">480 (40 yr)</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <label>Credit History</label>
        <select id="credit_history">
          <option value="1">Good (1)</option>
          <option value="0">Poor (0)</option>
        </select>
      </div>

      <button class="submit-btn" id="predictBtn" onclick="predict()">
        Predict Loan Eligibility
      </button>
    </div>

    <!-- Result -->
    <div class="card" id="result-card">
      <span class="result-icon" id="result-icon">🎯</span>
      <div class="result-status" id="result-status"></div>
      <div class="result-sub" id="result-sub"></div>

      <div class="prob-bar">
        <div class="prob-fill" id="prob-fill" style="width:0%"></div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Approval Prob.</div>
          <div class="metric-value" id="m-prob">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Risk Level</div>
          <div class="metric-value" id="m-risk">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Decision</div>
          <div class="metric-value" id="m-dec">—</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
async function predict() {
  const btn = document.getElementById('predictBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing...';

  const payload = {
    gender:            document.getElementById('gender').value,
    married:           document.getElementById('married').value,
    dependents:        document.getElementById('dependents').value,
    education:         document.getElementById('education').value,
    self_employed:     document.getElementById('self_employed').value,
    applicant_income:  document.getElementById('applicant_income').value,
    coapplicant_income:document.getElementById('coapplicant_income').value,
    loan_amount:       document.getElementById('loan_amount').value,
    loan_amount_term:  document.getElementById('loan_amount_term').value,
    credit_history:    document.getElementById('credit_history').value,
    property_area:     document.getElementById('property_area').value,
  };

  try {
    const res  = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);
    showResult(data);
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Predict Loan Eligibility';
  }
}

function showResult(data) {
  const card   = document.getElementById('result-card');
  const icon   = document.getElementById('result-icon');
  const status = document.getElementById('result-status');
  const sub    = document.getElementById('result-sub');
  const fill   = document.getElementById('prob-fill');
  const mProb  = document.getElementById('m-prob');
  const mRisk  = document.getElementById('m-risk');
  const mDec   = document.getElementById('m-dec');

  card.style.display = 'block';
  icon.textContent   = data.approved ? '✅' : '❌';
  status.textContent = data.approved ? 'Loan Approved' : 'Loan Rejected';
  status.className   = 'result-status ' + (data.approved ? 'approved' : 'rejected');
  sub.textContent    = data.approved
    ? `Your application shows strong eligibility signals.`
    : `Your application did not meet the current risk criteria.`;

  fill.style.width = data.probability + '%';
  fill.className   = 'prob-fill' + (data.probability < 50 ? ' low' : '');

  const riskColor = { Low: '#10b981', Medium: '#f59e0b', High: '#ef4444' };
  mProb.textContent         = data.probability + '%';
  mRisk.textContent         = data.risk;
  mRisk.style.color         = riskColor[data.risk] || '#e2e8f0';
  mDec.textContent          = data.approved ? 'PASS' : 'FAIL';
  mDec.style.color          = data.approved ? '#10b981' : '#ef4444';

  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
</script>
</body>
</html>
